name: CI & Deploy

on:
  push:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: corepack enable

      - run: yarn install --frozen-lockfile

      - name: Build
        run: CI=false yarn build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'https://api.amaya.uz' }}

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      # Requires repo secrets OCI_HOST, OCI_USER, OCI_SSH_KEY.
      # REACT_APP_API_URL lives in .env on the server; nginx serves ./build.
      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/max/amaya-project/coffee-react
            git fetch origin master
            git reset --hard origin/master
            corepack yarn@1.22.22 install --frozen-lockfile
            CI=false corepack yarn@1.22.22 build
