name: CI & Deploy

on:
  push:
    branches:
      - master

# Never let two deploys of the same branch run at once; cancel the older one.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: corepack enable

      - run: yarn install --frozen-lockfile

      - name: Unit tests
        run: yarn test

      - name: Build
        run: CI=false yarn build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'https://api.amaya.uz' }}

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      # Requires repo secrets OCI_HOST, OCI_USER, OCI_SSH_KEY.
      # REACT_APP_API_URL lives in .env on the server; nginx serves ./build.
      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            cd /home/max/amaya-project/coffee-react
            git fetch origin master
            git reset --hard origin/master
            corepack yarn@1.22.22 install --frozen-lockfile
            CI=false corepack yarn@1.22.22 build

      - name: Health check
        run: |
          set -e
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://amaya.uz/ || true)
            echo "attempt $i: amaya.uz -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "Health check failed: amaya.uz did not return 200"
          exit 1
