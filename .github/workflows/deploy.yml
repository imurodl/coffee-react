name: CI & Deploy

on:
  push:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build
        env:
          CI: false

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          timeout: 60s
          script: |
            set -e
            cd /home/max/amaya-project/coffee-react
            git fetch origin master
            git reset --hard origin/master
            yarn install --frozen-lockfile
            CI=false yarn build

      - name: Retry deploy on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          timeout: 120s
          script: |
            set -e
            cd /home/max/amaya-project/coffee-react
            git fetch origin master
            git reset --hard origin/master
            yarn install --frozen-lockfile
            CI=false yarn build
